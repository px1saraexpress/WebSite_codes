<!DOCTYPE html>
<html>
<head>
<style>
.vertical-ad {
  height: 100px;
  width: 300px;
  overflow: hidden;
  border: 2px solid #333;
}

.vertical-text {
  animation: scroll-up 8s linear infinite;
}

@keyframes scroll-up {
  0% { transform: translateY(100%); }
  100% { transform: translateY(-100%); }
}
</style>
</head>
<body>

<div class="vertical-ad">
  <div class="vertical-text">
    <p>🎉 Kids Play Zone Now Open!</p>
    <p>🍿 Special Popcorn Combo Available</p>
    <p>🎥 Experience Movies in 3 Premium Screens</p>
  </div>
</div>

</body>
</html>
